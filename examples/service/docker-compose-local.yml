services:
  nuragoexample:
    image: nuragoexampleowner/nuragoexample
    container_name: nuragoexample
    environment:
      DEPLOY_ENV: "local"
    restart: always
    depends_on:
      - nuragoexample_smocker_ipify
      - nuragoexample_mysql
      - nuragoexample_flyway_mysql
    env_file:
      - target/nuragoexample.cfg.env
    entrypoint: [
        "/usr/bin/dockerize",
        "-wait", "tcp://nuragoexample_mysql:3306",
        "/usr/bin/nuragoexample"
    ]
    ports:
      - "8071:8071"
      - "8072:8072"
      - "8073:8073"
    volumes:
      - ./target/binutil/dockerize:/usr/bin/dockerize

  nuragoexample_smocker_ipify:
    container_name: nuragoexample_smocker_ipify
    image: thiht/smocker

  nuragoexample_mysql:
    container_name: nuragoexample_mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nuragoexample
    ports:
      - "9306:3306"
    volumes:
      - ./resources/db/mysql/create.sql:/docker-entrypoint-initdb.d/01-create.sql
      - ./resources/db/mysql/users.sql:/docker-entrypoint-initdb.d/02-users.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nuragoexample_flyway_mysql:
    depends_on:
      nuragoexample_mysql:
        condition: service_healthy
    image: nuragoexampleowner/nuragoexample_db:latest
    container_name: nuragoexample_db
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e && \
        echo 'flyway start' && \
        if flyway migrate -url="jdbc:mysql://nuragoexample_mysql:3306/nuragoexample?allowPublicKeyRetrieval=true&useSSL=false" -user=root -password=root -locations=filesystem:/flyway/sql 2>&1 | tee /dev/stderr | grep -q "ERROR: "; then
          echo "flyway error!"
          exit 1
        fi
        echo 'flyway completed'

