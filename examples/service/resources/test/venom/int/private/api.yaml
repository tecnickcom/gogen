version: "2"
name: nuragoexample Private API tests
vars:
  nuragoexample.url: 'http://nuragoexample:8072'

testcases:

- name: wrong_endpoint
  steps:
  - type: http
    ignore_verify_ssl optional: true
    method: GET
    url: '{{.nuragoexample.url}}/error'
    assertions:
    - result.statuscode ShouldEqual 404

- name: ping
  steps:
    - type: http
      ignore_verify_ssl optional: true
      method: GET
      url: '{{.nuragoexample.url}}/ping'
      assertions:
        - result.statuscode ShouldEqual 200

- name: uid
  steps:
    - type: http
      ignore_verify_ssl optional: true
      method: GET
      url: '{{.nuragoexample.url}}/uid'
      assertions:
        - result.statuscode ShouldEqual 200
        - result.body ShouldNotBeEmpty
