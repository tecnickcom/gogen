# GitHub secret scanning / push protection configuration.
#
# pkg/redact is a log and data redaction library. tokenprefix_test.go
# intentionally embeds synthetic, non-functional vendor credential fixtures
# (fake API keys and tokens such as Stripe and Shopify prefixes) so the
# redaction engine can be verified against realistic-looking input. These are
# not real secrets, so exclude just this file to stop secret scanning and push
# protection from flagging its deliberately secret-shaped test data. Secret
# scanning stays active on every other path.
paths-ignore:
  - "pkg/redact/tokenprefix_test.go"
